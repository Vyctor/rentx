version: '3.7'

services:
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: rentx-devcontainer
    volumes:
      - .:/workspace:cached
      - rentx-node_modules:/workspace/node_modules
      - rentx-zsh-history:/home/node/.zsh_history
    command: sleep infinity
    environment:
      - TZ=America/Sao_Paulo
      - DB_HOST=postgres_rentx
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=docker
      - DB_NAME=rentx
    ports:
      - "3333:3333"
    depends_on:
      - postgres_rentx
    networks:
      - rentx-network

  postgres_rentx:
    image: postgres
    container_name: postgres_rentx
    restart: always
    tty: true
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=rentx
    networks:
      - rentx-network
    volumes:
      - pgdata:/data/postgres
  api-rentx:
    build: .
    entrypoint: .docker/entrypoint.sh
    container_name: api-rentx
    ports:
      - 3333:3333
    environment:
      - DB_HOST=postgres_rentx
    networks:
      - rentx-network
    volumes:
      - .:/usr/app
    links:
      - postgres_rentx
    depends_on:
      - postgres_rentx

volumes:
  pgdata:
    driver: local
  rentx-node_modules:
    driver: local
  rentx-zsh-history:
    driver: local
networks:
  rentx-network:
    driver: bridge
